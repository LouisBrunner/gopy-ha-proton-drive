name: Lint Go

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions: {}

jobs:
  vet:
    name: "Vet"
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: 1.26

      - name: Vet
        run: make vet
